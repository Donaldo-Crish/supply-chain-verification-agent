    <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glowGold" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#d4af37" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
  </radialGradient>

  <!-- Title gradient: cyan → gold -->
  <linearGradient id="gradTitle" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#22D3EE"/>
    <stop offset="40%" stop-color="#0891B2"/>
    <stop offset="70%" stop-color="#D4AF37"/>
    <stop offset="100%" stop-color="#22D3EE"/>
  </linearGradient>

  <!-- Box gradients — vivid, colorful -->
  <linearGradient id="gradBlue" x1="0" y1="0" x2="1" y2="1">
