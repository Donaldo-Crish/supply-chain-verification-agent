<svg viewBox="0 0 900 1100" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="csvGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#388bfd"/>
    </linearGradient>
    <linearGradient id="normGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8957e5"/>
      <stop offset="100%" style="stop-color:#a371f7"/>
    </linearGradient>
    <linearGradient id="hashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a7f37"/>
      <stop offset="100%" style="stop-color:#2ea043"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9e6a03"/>
      <stop offset="100%" style="stop-color:#d29922"/>
    </linearGradient>
    <linearGradient id="analyticsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d419d"/>
      <stop offset="100%" style="stop-color:#1f6feb"/>
    </linearGradient>
    <linearGradient id="investigationGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6e40c9"/>
      <stop offset="100%" style="stop-color:#8957e5"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#da3633"/>
      <stop offset="100%" style="stop-color:#f85149"/>
    </linearGradient>
    <linearGradient id="auditGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f4c35"/>
      <stop offset="100%" style="stop-color:#1a7f37"/>
    </linearGradient>
    <linearGradient id="uiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bf4b8a"/>
      <stop offset="100%" style="stop-color:#e75480"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#30363d"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388bfd"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a371f7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="1100" fill="url(#bgGrad)" rx="16"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="0.5"/>
  </pattern>
  <rect width="900" height="1100" fill="url(#grid)" rx="16"/>

  <!-- Title -->
  <text x="450" y="44" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="700" letter-spacing="2">SUPPLY CHAIN VERIFICATION AGENT</text>
  <text x="450" y="66" text-anchor="middle" fill="#8b949e" font-size="12" letter-spacing="1">System Architecture</text>
  <line x1="200" y1="76" x2="700" y2="76" stroke="#21262d" stroke-width="1"/>

  <!-- ── NODE 1: CSV Input ── -->
  <rect x="290" y="96" width="320" height="76" rx="12" fill="url(#csvGrad)" filter="url(#shadow)" opacity="0.92"/>
  <rect x="290" y="96" width="320" height="76" rx="12" fill="none" stroke="#388bfd" stroke-width="1.5" opacity="0.6"/>
  <text x="364" y="122" fill="#ffffff" font-size="11" font-weight="600" letter-spacing="1" opacity="0.7">📂  DATA INGESTION</text>
  <text x="450" y="143" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">CSV Product Data</text>
  <text x="450" y="161" text-anchor="middle" fill="#cae8ff" font-size="11">Multi-source Supply Chain Manifests</text>

  <!-- Arrow 1→2 -->
  <line x1="450" y1="172" x2="450" y2="204" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── NODE 2: Normalization ── -->
  <rect x="270" y="208" width="360" height="96" rx="12" fill="url(#normGrad)" filter="url(#shadow)" opacity="0.92"/>
  <rect x="270" y="208" width="360" height="96" rx="12" fill="none" stroke="#a371f7" stroke-width="1.5" opacity="0.6"/>
  <text x="340" y="232" fill="#ffffff" font-size="11" font-weight="600" letter-spacing="1" opacity="0.7">🧠  SEMANTIC ENGINE</text>
  <text x="450" y="253" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">Data Normalization</text>
  <text x="370" y="274" fill="#e2ccff" font-size="11">• Synonym Mapping</text>
  <text x="370" y="290" fill="#e2ccff" font-size="11">• Field Validation  •  Status Standardization</text>

  <!-- Arrow 2→3 -->
  <line x1="450" y1="304" x2="450" y2="336" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── NODE 3: Hashing ── -->
  <rect x="300" y="340" width="300" height="70" rx="12" fill="url(#hashGrad)" filter="url(#shadow)" opacity="0.92"/>
  <rect x="300" y="340" width="300" height="70" rx="12" fill="none" stroke="#2ea043" stroke-width="1.5" opacity="0.6"/>
  <text x="357" y="363" fill="#ffffff" font-size="11" font-weight="600" letter-spacing="1" opacity="0.7">🔐  INTEGRITY LAYER</text>
  <text x="450" y="384" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">SHA-256 Hashing</text>
  <text x="450" y="400" text-anchor="middle" fill="#9af4af" font-size="11">Tamper-proof Fingerprinting</text>

  <!-- Arrow 3→4 -->
  <line x1="450" y1="410" x2="450" y2="442" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── NODE 4: SQLite ── -->
  <rect x="280" y="446" width="340" height="70" rx="12" fill="url(#dbGrad)" filter="url(#shadow)" opacity="0.92"/>
  <rect x="280" y="446" width="340" height="70" rx="12" fill="none" stroke="#d29922" stroke-width="1.5" opacity="0.6"/>
  <text x="344" y="469" fill="#ffffff" font-size="11" font-weight="600" letter-spacing="1" opacity="0.7">🗄️  LEDGER STORAGE</text>
  <text x="450" y="490" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">SQLite Immutable Ledger</text>
  <text x="450" y="506" text-anchor="middle" fill="#ffe0a0" font-size="11">Indexed  •  Cached  •  Tamper-logged</text>

  <!-- Fork arrows from DB -->
  <!-- Left branch -->
  <path d="M 380 516 L 380 548 L 188 548 L 188 580" stroke="#30363d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <!-- Right branch -->
  <path d="M 520 516 L 520 548 L 712 548 L 712 580" stroke="#30363d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- ── NODE 5L: Analytics ── -->
  <rect x="70" y="584" width="236" height="110" rx="12" fill="url(#analyticsGrad)" filter="url(#shadow)" opacity="0.92"/>
  <rect x="70" y="584" width="236" height="110" rx="12" fill="none" stroke="#1f6feb" stroke-width="1.5" opacity="0.6"/>
  <text x="110" y="606" fill="#ffffff" font-size="10" font-weight="600" letter-spacing="1" opacity="0.7">📊  ANALYTICS LAYER</text>
  <text x="188" y="627" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">Risk Analytics</text>
  <text x="110" y="648" fill="#b0d0ff" font-size="11">• KPI Metrics &amp; Risk Scores</text>
  <text x="110" y="664" fill="#b0d0ff" font-size="11">• Manufacturer Heatmaps</text>
  <text x="110" y="680" fill="#b0d0ff" font-size="11">• Node Velocity Tracking</text>

  <!-- ── NODE 5R: Investigation ── -->
  <rect x="594" y="584" width="236" height="110" rx="12" fill="url(#investigationGrad)" filter="url(#shadow)" opacity="0.92"/>
  <rect x="594" y="584" width="236" height="110" rx="12" fill="none" stroke="#8957e5" stroke-width="1.5" opacity="0.6"/>
  <text x="624" y="606" fill="#ffffff" font-size="10" font-weight="600" letter-spacing="1" opacity="0.7">🔍  FORENSIC LAYER</text>
  <text x="712" y="627" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">Investigation Engine</text>
  <text x="624" y="648" fill="#e2d0ff" font-size="11">• Smart Product Search</text>
  <text x="624" y="664" fill="#e2d0ff" font-size="11">• Chain of Custody Analysis</text>
  <text x="624" y="680" fill="#e2d0ff" font-size="11">• Manufacturer Pattern Check</text>

  <!-- Arrow from Investigation to AI -->
  <line x1="712" y1="694" x2="712" y2="726" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 712 726 L 712 740 L 560 740 L 560 756" stroke="#30363d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- ── NODE 6: AI Agent ── -->
  <rect x="290" y="760" width="320" height="90" rx="12" fill="url(#aiGrad)" filter="url(#shadow)" opacity="0.92"/>
  <rect x="290" y="760" width="320" height="90" rx="12" fill="none" stroke="#f85149" stroke-width="1.5" opacity="0.6"/>
  <text x="344" y="782" fill="#ffffff" font-size="10" font-weight="600" letter-spacing="1" opacity="0.7">🤖  REASONING ENGINE</text>
  <text x="450" y="803" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">AI Forensic Agent</text>
  <text x="450" y="821" text-anchor="middle" fill="#ffc0bb" font-size="12" font-weight="600">LLaMA 3.3 70B  via  Groq API</text>
  <text x="450" y="840" text-anchor="middle" fill="#ffc0bb" font-size="11">Forensic Audit  •  Risk Level  •  Chat Q&amp;A</text>

  <!-- Converge arrows from Analytics + AI to Audit -->
  <!-- Analytics → Audit -->
  <path d="M 188 694 L 188 886 L 290 886" stroke="#30363d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <!-- AI → Audit -->
  <line x1="450" y1="850" x2="450" y2="876" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── NODE 7: Audit ── -->
  <rect x="190" y="880" width="520" height="96" rx="12" fill="url(#auditGrad)" filter="url(#shadow)" opacity="0.92"/>
  <rect x="190" y="880" width="520" height="96" rx="12" fill="none" stroke="#2ea043" stroke-width="1.5" opacity="0.6"/>
  <text x="282" y="902" fill="#ffffff" font-size="10" font-weight="600" letter-spacing="1" opacity="0.7">📋  AUDIT &amp; REPORTING SYSTEM</text>
  <text x="450" y="923" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">Audit &amp; Reporting Layer</text>
  <text x="300" y="944" fill="#9af4af" font-size="11">• PDF Audit Export</text>
  <text x="300" y="960" fill="#9af4af" font-size="11">• SHA Integrity Verification</text>
  <text x="500" y="944" fill="#9af4af" font-size="11">• Chain of Custody Report</text>
  <text x="500" y="960" fill="#9af4af" font-size="11">• Risk Assessment Summary</text>

  <!-- Arrow 7→8 -->
  <line x1="450" y1="976" x2="450" y2="1008" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── NODE 8: UI ── -->
  <rect x="200" y="1012" width="500" height="68" rx="12" fill="url(#uiGrad)" filter="url(#shadow)" opacity="0.92"/>
  <rect x="200" y="1012" width="500" height="68" rx="12" fill="none" stroke="#e75480" stroke-width="1.5" opacity="0.6"/>
  <text x="290" y="1034" fill="#ffffff" font-size="10" font-weight="600" letter-spacing="1" opacity="0.7">🌐  WEB INTERFACE</text>
  <text x="450" y="1055" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">Streamlit Web Application</text>
  <text x="450" y="1072" text-anchor="middle" fill="#ffd0e8" font-size="11">Analytics Dashboard  •  Forensic Investigator  •  Ledger Management</text>

  <!-- Footer -->
  <text x="450" y="1092" text-anchor="middle" fill="#484f58" font-size="10">Built with Python · SQLite · Groq API · LLaMA 3.3 · Streamlit · ReportLab</text>
</svg>
