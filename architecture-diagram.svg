<svg width="900" height="1900" viewBox="0 0 900 1900" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="gradBG" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#080d18"/>
    <stop offset="100%" stop-color="#0f1520"/>
  </linearGradient>

